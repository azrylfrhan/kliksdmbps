server {
    listen ${PORT:-8080};
    server_name _;

    # Serve files from /usr/share/nginx/html (root set by default)
    root /usr/share/nginx/html;

    # Hide nginx version (security)
    server_tokens off;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;

    # Main route - serve index.html
    location / {
        # Try to serve the exact file first
        # If file doesn't exist or is a directory, serve index.html (SPA fallback)
        try_files $uri $uri/ /index.html;

        # Cache control for index.html - no cache (always check for updates)
        if ($request_filename = /index.html) {
            add_header Cache-Control "no-cache, no-store, must-revalidate, public, max-age=0";
        }

        # Cache static assets for 1 year
        if ($request_filename ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$) {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Prevent access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ /\.git {
        deny all;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
